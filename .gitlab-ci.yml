stages:
  - test
  - lint
  - security

variables:
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.pip-cache"

cache:
  paths:
    - .pip-cache/

python-test:
  stage: test
  image: python:3.12-slim
  before_script:
    - pip install -r requirements-dev.txt --quiet
  script:
    - pytest tests/ -v

python-lint:
  stage: lint
  image: python:3.12-slim
  before_script:
    - pip install -r requirements.txt pylint --quiet
  script:
    - pylint --fail-under=7.0 --disable=C0114,C0115,C0116,R0903 scripts/*.py

python-security:
  stage: security
  image: python:3.12-slim
  before_script:
    - pip install -r requirements.txt bandit --quiet
  script:
    - bandit -ll scripts/*.py

dependency-check:
  stage: security
  image: python:3.12-slim
  before_script:
    - pip install pip-audit --quiet
  script:
    - pip-audit -r requirements.txt --strict
